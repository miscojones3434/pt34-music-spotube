name: PT34-MUSIC PWA

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pt34-music-pages
  cancel-in-progress: true

jobs:
  build:
    name: Biblioteca y reproductor PT34-MUSIC
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Crear PWA estática
        run: |
          rm -rf site
          mkdir -p site
          touch site/.nojekyll

          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="es">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta name="theme-color" content="#9b5cff">
            <meta name="description" content="PT34-MUSIC · Biblioteca musical personal">
            <link rel="manifest" href="./manifest.webmanifest">
            <link rel="icon" href="./icon.svg" type="image/svg+xml">
            <title>PT34-MUSIC</title>

            <style>
              :root{
                --bg:#111015;
                --surface:#1c1822;
                --surface2:#282130;
                --purple:#9b5cff;
                --light:#d8c2ff;
                --text:#f5eff8;
                --muted:#b8b0c1;
                --line:rgba(255,255,255,.09);
                --danger:#ff6d80;
              }

              *{box-sizing:border-box}
              html{background:var(--bg)}
              body{
                margin:0;
                min-height:100vh;
                background:var(--bg);
                color:var(--text);
                font-family:Arial,Helvetica,sans-serif;
              }

              button,input{font:inherit}
              button{border:0;cursor:pointer}
              button:active{transform:scale(.98)}

              .app{
                width:min(760px,100%);
                min-height:100vh;
                margin:0 auto;
                padding-bottom:178px;
              }

              header{
                display:flex;
                align-items:center;
                gap:12px;
                padding:20px;
              }

              .logo{
                width:49px;
                height:49px;
                display:grid;
                place-items:center;
                border-radius:16px;
                background:var(--purple);
                color:#fff;
                font-size:27px;
                font-weight:900;
              }

              .brand{flex:1}
              .brand strong{
                display:block;
                font-size:21px;
                letter-spacing:.4px;
              }

              .brand span{
                display:block;
                margin-top:3px;
                color:var(--muted);
                font-size:13px;
              }

              .install{
                padding:10px 12px;
                border-radius:14px;
                background:var(--surface);
                color:var(--light);
                font-weight:700;
              }

              main{padding:0 20px 28px}
              .page{display:none}
              .page.active{display:block}

              h1,h2,h3{margin:0}
              h2{
                margin:28px 0 14px;
                font-size:21px;
              }

              .search{
                width:100%;
                padding:16px 18px;
                border:0;
                outline:0;
                border-radius:18px;
                background:var(--surface);
                color:#fff;
                font-size:16px;
              }

              .hero{
                margin-top:20px;
                padding:24px;
                border-radius:28px;
                background:linear-gradient(135deg,#9b5cff,#56319d);
              }

              .hero h1{
                font-size:31px;
                margin-bottom:10px;
              }

              .hero p{
                margin:0;
                max-width:480px;
                line-height:1.45;
                font-size:16px;
              }

              .primary{
                margin-top:20px;
                padding:14px 19px;
                border-radius:16px;
                background:#fff;
                color:#542a9c;
                font-weight:900;
              }

              .stats{
                display:grid;
                grid-template-columns:repeat(3,1fr);
                gap:10px;
                margin-top:18px;
              }

              .stat{
                padding:14px 10px;
                border-radius:18px;
                background:var(--surface);
                text-align:center;
              }

              .stat strong{
                display:block;
                font-size:22px;
                color:var(--light);
              }

              .stat span{
                display:block;
                margin-top:4px;
                color:var(--muted);
                font-size:12px;
              }

              .collections{
                display:flex;
                gap:12px;
                overflow-x:auto;
                padding-bottom:3px;
              }

              .collection{
                min-width:164px;
                min-height:125px;
                padding:16px;
                border:0;
                border-radius:20px;
                background:var(--surface);
                color:var(--text);
                text-align:left;
              }

              .collection .icon{
                color:var(--light);
                font-size:28px;
              }

              .collection strong{
                display:block;
                margin-top:22px;
              }

              .collection span{
                display:block;
                margin-top:5px;
                color:var(--muted);
                font-size:12px;
              }

              .list{display:grid;gap:10px}

              .item{
                display:flex;
                align-items:center;
                gap:12px;
                width:100%;
                padding:14px;
                border-radius:18px;
                background:var(--surface);
                color:var(--text);
                text-align:left;
              }

              .item-icon{
                width:42px;
                height:42px;
                display:grid;
                place-items:center;
                flex:none;
                border-radius:13px;
                background:rgba(155,92,255,.2);
                color:var(--light);
                font-size:20px;
              }

              .item-text{flex:1;min-width:0}
              .item-text strong,
              .item-text span{display:block}

              .item-text strong{
                overflow:hidden;
                text-overflow:ellipsis;
                white-space:nowrap;
              }

              .item-text span{
                margin-top:4px;
                overflow:hidden;
                color:var(--muted);
                font-size:13px;
                text-overflow:ellipsis;
                white-space:nowrap;
              }

              .arrow{
                color:var(--muted);
                font-size:25px;
              }

              .form{
                display:grid;
                gap:11px;
                padding:18px;
                border-radius:22px;
                background:var(--surface);
              }

              .form input{
                width:100%;
                padding:14px;
                border:1px solid var(--line);
                outline:0;
                border-radius:14px;
                background:#121016;
                color:#fff;
              }

              .form button{
                padding:14px;
                border-radius:14px;
                background:var(--purple);
                color:#fff;
                font-weight:900;
              }

              .empty{
                padding:34px 20px;
                border-radius:24px;
                background:var(--surface);
                color:var(--muted);
                line-height:1.5;
                text-align:center;
              }

              .empty strong{
                display:block;
                margin-bottom:8px;
                color:#fff;
                font-size:20px;
              }

              .song{
                display:grid;
                grid-template-columns:45px 1fr auto;
                align-items:center;
                gap:11px;
                padding:12px;
                border-radius:18px;
                background:var(--surface);
              }

              .song-cover{
                width:45px;
                height:45px;
                display:grid;
                place-items:center;
                border-radius:14px;
                background:linear-gradient(135deg,#9b5cff,#6b3cc1);
                color:#fff;
                font-size:21px;
              }

              .song-main{min-width:0}
              .song-main strong,
              .song-main span{display:block}

              .song-main strong{
                overflow:hidden;
                text-overflow:ellipsis;
                white-space:nowrap;
              }

              .song-main span{
                margin-top:4px;
                overflow:hidden;
                color:var(--muted);
                font-size:12px;
                text-overflow:ellipsis;
                white-space:nowrap;
              }

              .song-tools{
                display:flex;
                gap:6px;
              }

              .round{
                width:36px;
                height:36px;
                display:grid;
                place-items:center;
                border-radius:12px;
                background:var(--surface2);
                color:var(--light);
                font-size:17px;
              }

              .round.delete{color:var(--danger)}

              .player{
                position:fixed;
                z-index:3;
                left:50%;
                bottom:67px;
                width:min(760px,100%);
                transform:translateX(-50%);
                padding:12px 16px;
                background:#272130;
                border-top:1px solid var(--line);
              }

              .player-top{
                display:flex;
                align-items:center;
                gap:11px;
              }

              .player-art{
                width:38px;
                height:38px;
                display:grid;
                place-items:center;
                border-radius:12px;
                background:var(--purple);
              }

              .player-name{
                flex:1;
                min-width:0;
              }

              .player-name strong,
              .player-name span{display:block}

              .player-name strong{
                overflow:hidden;
                text-overflow:ellipsis;
                white-space:nowrap;
                font-size:14px;
              }

              .player-name span{
                margin-top:2px;
                color:var(--muted);
                font-size:11px;
              }

              .controls{
                display:flex;
                align-items:center;
                gap:7px;
              }

              .control{
                width:35px;
                height:35px;
                border-radius:11px;
                background:transparent;
                color:#fff;
                font-size:17px;
              }

              .control.play{
                background:var(--purple);
              }

              .timeline{
                width:100%;
                margin-top:9px;
                accent-color:var(--purple);
              }

              nav{
                position:fixed;
                z-index:4;
                left:50%;
                bottom:0;
                width:min(760px,100%);
                transform:translateX(-50%);
                display:grid;
                grid-template-columns:repeat(4,1fr);
                padding:9px 8px max(9px,env(safe-area-inset-bottom));
                background:#17141c;
                border-top:1px solid var(--line);
              }

              .tab{
                padding:8px 3px;
                background:transparent;
                color:var(--muted);
                font-size:12px;
              }

              .tab.active{
                color:var(--light);
                font-weight:900;
              }

              .toast{
                position:fixed;
                z-index:8;
                left:50%;
                bottom:162px;
                max-width:calc(100% - 36px);
                transform:translateX(-50%) translateY(18px);
                padding:12px 16px;
                border-radius:14px;
                background:#fff;
                color:#251a31;
                font-size:14px;
                opacity:0;
                pointer-events:none;
                transition:.2s ease;
              }

              .toast.show{
                opacity:1;
                transform:translateX(-50%) translateY(0);
              }

              [hidden]{display:none!important}
            </style>
          </head>

          <body>
            <div class="app">
              <header>
                <div class="logo">♫</div>
                <div class="brand">
                  <strong>PT34-MUSIC</strong>
                  <span>Tu música, tu biblioteca</span>
                </div>
                <button class="install" id="installButton" hidden>Instalar</button>
              </header>

              <main>
                <section class="page active" id="inicio">
                  <input class="search" id="homeSearch" readonly placeholder="Buscar en tu biblioteca">

                  <div class="hero">
                    <h1>Todo listo</h1>
                    <p>Añade y organiza enlaces de audio propios o autorizados. Todo queda guardado únicamente en este navegador.</p>
                    <button class="primary" data-page="biblioteca">AÑADIR FUENTE</button>
                  </div>

                  <div class="stats">
                    <div class="stat"><strong id="trackCount">0</strong><span>Fuentes</span></div>
                    <div class="stat"><strong id="favoriteCount">0</strong><span>Favoritos</span></div>
                    <div class="stat"><strong id="playingCount">—</strong><span>Ahora</span></div>
                  </div>

                  <h2>Tus colecciones</h2>
                  <div class="collections">
                    <button class="collection" data-page="biblioteca">
                      <div class="icon">♥</div>
                      <strong>Favoritos</strong>
                      <span id="favoritesLabel">Sin favoritos</span>
                    </button>

                    <button class="collection" data-page="biblioteca">
                      <div class="icon">♫</div>
                      <strong>Mi música</strong>
                      <span id="libraryLabel">Biblioteca vacía</span>
                    </button>

                    <button class="collection" data-page="buscar">
                      <div class="icon">⌕</div>
                      <strong>Buscar</strong>
                      <span>Encuentra tus fuentes</span>
                    </button>
                  </div>

                  <h2>Empieza por aquí</h2>
                  <div class="list">
                    <button class="item" data-page="biblioteca">
                      <div class="item-icon">＋</div>
                      <div class="item-text">
                        <strong>Añade una fuente autorizada</strong>
                        <span>URL directa de audio compatible con web.</span>
                      </div>
                      <div class="arrow">›</div>
                    </button>

                    <button class="item" id="exportHome">
                      <div class="item-icon">⇩</div>
                      <div class="item-text">
                        <strong>Guarda una copia de tu biblioteca</strong>
                        <span>Exporta tus fuentes a un archivo JSON.</span>
                      </div>
                      <div class="arrow">›</div>
                    </button>
                  </div>
                </section>

                <section class="page" id="buscar">
                  <h2>Buscar</h2>
                  <input class="search" id="searchInput" placeholder="Busca en tus fuentes">
                  <div class="list" id="searchResults" style="margin-top:18px"></div>
                </section>

                <section class="page" id="biblioteca">
                  <h2>Biblioteca</h2>

                  <div class="empty" id="emptyState">
                    <strong>Tu biblioteca está vacía</strong>
                    Añade una URL de audio sobre la que tengas permiso de uso. La fuente se guarda en este navegador.
                  </div>

                  <form class="form" id="trackForm" style="margin-top:18px">
                    <input id="trackTitle" maxlength="70" placeholder="Nombre de la fuente, artista o emisora">
                    <input id="trackUrl" type="url" required placeholder="https://ejemplo.com/audio.mp3">
                    <button type="submit">GUARDAR Y REPRODUCIR</button>
                  </form>

                  <h2 id="libraryTitle">Tus fuentes</h2>
                  <div class="list" id="libraryList"></div>
                </section>

                <section class="page" id="perfil">
                  <h2>Perfil</h2>

                  <div class="list">
                    <div class="item">
                      <div class="item-icon">☺</div>
                      <div class="item-text">
                        <strong>PT34-MUSIC</strong>
                        <span>Edición PWA · datos locales</span>
                      </div>
                    </div>

                    <button class="item" id="exportButton">
                      <div class="item-icon">⇩</div>
                      <div class="item-text">
                        <strong>Exportar biblioteca</strong>
                        <span>Guarda tus fuentes en un archivo JSON.</span>
                      </div>
                      <div class="arrow">›</div>
                    </button>

                    <button class="item" id="importButton">
                      <div class="item-icon">⇧</div>
                      <div class="item-text">
                        <strong>Importar biblioteca</strong>
                        <span>Recupera una copia guardada anteriormente.</span>
                      </div>
                      <div class="arrow">›</div>
                    </button>

                    <button class="item" id="clearButton">
                      <div class="item-icon">×</div>
                      <div class="item-text">
                        <strong>Eliminar datos locales</strong>
                        <span>Borra las fuentes guardadas de este dispositivo.</span>
                      </div>
                      <div class="arrow">›</div>
                    </button>
                  </div>

                  <input id="importFile" type="file" accept="application/json" hidden>
                </section>
              </main>
            </div>

            <div class="player" id="player" hidden>
              <div class="player-top">
                <div class="player-art">♫</div>
                <div class="player-name">
                  <strong id="nowTitle">Sin reproducción</strong>
                  <span id="nowSubtitle">Tu reproductor personal</span>
                </div>

                <div class="controls">
                  <button class="control" id="previousButton" aria-label="Anterior">‹</button>
                  <button class="control play" id="playButton" aria-label="Reproducir">▶</button>
                  <button class="control" id="nextButton" aria-label="Siguiente">›</button>
                </div>
              </div>

              <input class="timeline" id="timeline" type="range" min="0" max="100" value="0">
            </div>

            <audio id="audio" preload="metadata"></audio>

            <nav>
              <button class="tab active" data-page="inicio">⌂<br>Inicio</button>
              <button class="tab" data-page="buscar">⌕<br>Buscar</button>
              <button class="tab" data-page="biblioteca">♫<br>Biblioteca</button>
              <button class="tab" data-page="perfil">☺<br>Perfil</button>
            </nav>

            <div class="toast" id="toast"></div>

            <script>
              const STORAGE_KEY = "pt34_music_library_v2";
              const CURRENT_KEY = "pt34_music_current_v2";

              const audio = document.querySelector("#audio");
              const player = document.querySelector("#player");
              const timeline = document.querySelector("#timeline");
              const playButton = document.querySelector("#playButton");
              const nowTitle = document.querySelector("#nowTitle");
              const nowSubtitle = document.querySelector("#nowSubtitle");
              const toast = document.querySelector("#toast");

              let tracks = loadTracks();
              let currentId = localStorage.getItem(CURRENT_KEY) || null;

              function loadTracks() {
                try {
                  const value = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
                  return Array.isArray(value) ? value : [];
                } catch (_) {
                  return [];
                }
              }

              function saveTracks() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(tracks));
              }

              function escapeHtml(value) {
                return String(value).replace(/[&<>"']/g, character => ({
                  "&":"&amp;",
                  "<":"&lt;",
                  ">":"&gt;",
                  "\"":"&quot;",
                  "'":"&#039;"
                })[character]);
              }

              function getCurrent() {
                return tracks.find(track => track.id === currentId) || null;
              }

              function showToast(text) {
                toast.textContent = text;
                toast.classList.add("show");
                clearTimeout(window.toastTimer);
                window.toastTimer = setTimeout(() => {
                  toast.classList.remove("show");
                }, 2700);
              }

              function showPage(page) {
                document.querySelectorAll(".page").forEach(item => {
                  item.classList.toggle("active", item.id === page);
                });

                document.querySelectorAll(".tab").forEach(item => {
                  item.classList.toggle("active", item.dataset.page === page);
                });

                if (page === "buscar") {
                  setTimeout(() => document.querySelector("#searchInput").focus(), 120);
                }

                window.scrollTo({ top: 0, behavior: "smooth" });
              }

              function renderStats() {
                const favorites = tracks.filter(track => track.favorite).length;
                const current = getCurrent();

                document.querySelector("#trackCount").textContent = tracks.length;
                document.querySelector("#favoriteCount").textContent = favorites;
                document.querySelector("#playingCount").textContent =
                  current ? "♫" : "—";

                document.querySelector("#favoritesLabel").textContent =
                  favorites ? favorites + " guardado
