name: PT34-MUSIC · Publicar como IOS

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "lib/main_web.dart"
      - ".github/workflows/PT34-MUSIC-PWA.yml"
      - "assets/branding/pt34-music-logo.png"

permissions:
  contents: write

jobs:
  crear-pwa:
    name: Compilar PWA y subir a pt34-pwa
    runs-on: ubuntu-22.04
    timeout-minutes: 12

    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: "3.35.2"
          channel: stable
          cache: true

      - name: Crear proyecto web ligero
        run: |
          rm -rf .pt34-web

          flutter create \
            --platforms=web \
            --project-name pt34_music_web \
            .pt34-web

          cp lib/main_web.dart .pt34-web/lib/main.dart

          python3 - <<'PY'
          from pathlib import Path

          path = Path(".pt34-web/web/index.html")
          html = path.read_text(encoding="utf-8")
          html = html.replace(
              "<title>pt34_music_web</title>",
              "<title>PT34-MUSIC</title>",
          )
          path.write_text(html, encoding="utf-8")
          PY

      - name: Compilar PT34-MUSIC
        working-directory: .pt34-web
        run: |
          flutter pub get
          flutter build web \
            --release \
            --base-href "/pt34-music-spotube/"

      - name: Preparar PWA final
        run: |
          cp .pt34-web/build/web/index.html \
            .pt34-web/build/web/404.html

          if [ -f assets/branding/pt34-music-logo.png ]; then
            cp assets/branding/pt34-music-logo.png \
              .pt34-web/build/web/pt34-music-logo.png
          else
            cp .pt34-web/build/web/icons/Icon-512.png \
              .pt34-web/build/web/pt34-music-logo.png
          fi

          touch .pt34-web/build/web/.nojekyll

          cat > .pt34-web/build/web/manifest.json <<'JSON'
          {
            "name": "PT34-MUSIC",
            "short_name": "PT34-MUSIC",
            "start_url": "./",
            "scope": "./",
            "display": "standalone",
            "background_color": "#100E14",
            "theme_color": "#9B5CFF",
            "description": "PT34-MUSIC",
            "lang": "es-ES",
            "icons": [
              {
                "src": "pt34-music-logo.png",
                "sizes": "512x512",
                "type": "image/png",
                "purpose": "any maskable"
              }
            ]
          }
          JSON

      - name: Subir PWA a pt34-pwa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          rm -rf .pt34-pwa
          mkdir .pt34-pwa

          cp -a .pt34-web/build/web/. .pt34-pwa/

          cd .pt34-pwa

          git init --initial-branch=pt34-pwa

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add --all
          git commit -m "PT34-MUSIC PWA ${SHA}"

          git remote add origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git"

          git push --force origin HEAD:pt34-pwa
