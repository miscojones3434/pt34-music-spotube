name: PT34-MUSIC · Spotube Web

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "lib/main_web.dart"
      - ".github/workflows/PT34-MUSIC-PWA.yml"
      - "assets/branding/pt34-music-logo.png"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pt34-music-pages
  cancel-in-progress: true

jobs:
  build:
    name: Compilar PT34-MUSIC Web
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: "3.35.2"
          channel: stable
          cache: true

      - name: Crear proyecto web mínimo
        run: |
          rm -rf .pt34-web

          flutter create \
            --platforms=web \
            --project-name pt34_music_web \
            .pt34-web

          cp lib/main_web.dart .pt34-web/lib/main.dart

      - name: Compilar solo PT34-MUSIC Web
        working-directory: .pt34-web
        run: |
          flutter pub get

          flutter build web \
            --release \
            --base-href "/pt34-music-spotube/"

      - name: Aplicar logo y PWA
        run: |
          cp assets/branding/pt34-music-logo.png \
            .pt34-web/build/web/pt34-music-logo.png

          cp .pt34-web/build/web/index.html \
            .pt34-web/build/web/404.html

          cat > .pt34-web/build/web/manifest.json <<'JSON'
          {
            "name": "PT34-MUSIC",
            "short_name": "PT34-MUSIC",
            "start_url": "./",
            "scope": "./",
            "display": "standalone",
            "background_color": "#100E14",
            "theme_color": "#9B5CFF",
            "description": "PT34-MUSIC · Spotube Web",
            "lang": "es-ES",
            "icons": [
              {
                "src": "pt34-music-logo.png",
                "sizes": "512x512",
                "type": "image/png",
                "purpose": "any maskable"
              }
            ]
          }
          JSON

      - name: Subir PWA
        uses: actions/upload-pages-artifact@v4
        with:
          path: .pt34-web/build/web

  deploy:
    name: Publicar PT34-MUSIC
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 6
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Publicar PWA
        id: deployment
        uses: actions/deploy-pages@v4
