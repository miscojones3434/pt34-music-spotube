name: PT34-MUSIC · Spotube Web

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "lib/main_web.dart"
      - ".github/workflows/PT34-MUSIC-PWA.yml"
      - "assets/branding/pt34-music-logo.png"

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pt34-music-pages
  cancel-in-progress: true

jobs:
  build:
    name: Compilar PT34-MUSIC Web
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: "3.35.2"
          channel: stable
          cache: true

      - name: Crear configuración local
        run: |
          cat > .env <<'EOF'
          ENABLE_UPDATE_CHECK=0
          LASTFM_API_KEY=
          LASTFM_API_SECRET=
          RELEASE_CHANNEL=stable
          HIDE_DONATIONS=1
          EOF

      - name: Descargar dependencias
        run: flutter pub get

      - name: Compilar entrada web PT34-MUSIC
        run: |
          flutter build web \
            --release \
            --target lib/main_web.dart \
            --base-href "/pt34-music-spotube/"

      - name: Aplicar identidad PT34-MUSIC
        run: |
          cp assets/branding/pt34-music-logo.png build/web/pt34-music-logo.png
          cp build/web/index.html build/web/404.html

          cat > build/web/manifest.json <<'JSON'
          {
            "name": "PT34-MUSIC",
            "short_name": "PT34-MUSIC",
            "start_url": "./",
            "scope": "./",
            "display": "standalone",
            "background_color": "#100E14",
            "theme_color": "#9B5CFF",
            "description": "PT34-MUSIC · Spotube Web",
            "lang": "es-ES",
            "icons": [
              {
                "src": "pt34-music-logo.png",
                "sizes": "512x512",
                "type": "image/png",
                "purpose": "any maskable"
              }
            ]
          }
          JSON

      - name: Subir PWA preparada
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    name: Publicar PT34-MUSIC
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 6
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Liberar despliegue anterior bloqueado
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          STATUS="$(curl -sS -o /tmp/pages-cancel.json -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/deployments/${COMMIT_SHA}/cancel")"

          echo "Cancelación del despliegue anterior: HTTP ${STATUS}"
          sleep 8

      - name: Publicar PWA
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: "240000"
          error_count: "3"
          reporting_interval: "5000"
