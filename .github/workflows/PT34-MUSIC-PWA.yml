name: PT34-MUSIC · APK Android

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  android-apk:
    name: Generar APK Android
    runs-on: ubuntu-22.04

    env:
      FLUTTER_VERSION: "3.35.2"
      CHANNEL: "stable"

    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Crear configuración de compilación
        run: |
          cat > .env <<'EOF'
          ENABLE_UPDATE_CHECK=0
          LASTFM_API_KEY=
          LASTFM_API_SECRET=
          RELEASE_CHANNEL=stable
          HIDE_DONATIONS=1
          EOF

      - name: Descargar dependencias Flutter
        run: flutter pub get

      - name: Preparar dependencias Android
        run: dart cli/cli.dart install-dependencies --platform=android --arch=all

      - name: Generar archivos necesarios
        run: |
          dart run build_runner build --delete-conflicting-outputs
          flutter gen-l10n

      - name: Crear firma temporal para APK
        run: |
          mkdir -p android/app/app

          keytool -genkeypair -v \
            -keystore android/app/upload-keystore.jks \
            -storepass pt34music \
            -alias pt34music \
            -keypass pt34music \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=PT34-MUSIC, OU=PT34, O=PT34-MUSIC, L=Madrid, ST=Madrid, C=ES" \
            -noprompt

          cp android/app/upload-keystore.jks android/app/app/upload-keystore.jks

          cat > android/key.properties <<'EOF'
          storePassword=pt34music
          keyPassword=pt34music
          keyAlias=pt34music
          storeFile=upload-keystore.jks
          EOF

      - name: Compilar APK Android
        run: |
          dart cli/cli.dart build --arch=all android
          find build -name "*.apk" -type f -print
          APK_FILE="$(find build -name "*.apk" -type f | head -n 1)"
          test -n "$APK_FILE"
          cp "$APK_FILE" build/PT34-MUSIC-android-all-arch.apk

      - name: Subir APK terminada
        uses: actions/upload-artifact@v4
        with:
          name: PT34-MUSIC-APK
          path: build/PT34-MUSIC-android-all-arch.apk
          if-no-files-found: error
