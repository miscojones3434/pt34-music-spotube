name: PT34-MUSIC · Spotube Web Real

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/PT34-MUSIC-PWA.yml"

permissions:
  contents: read

jobs:
  comprobar-spotube-web:
    name: Compilar Spotube real para web
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - name: Descargar Spotube
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: "3.35.2"
          channel: stable
          cache: true

      - name: Crear configuración local
        run: |
          cat > .env <<'EOF'
          ENABLE_UPDATE_CHECK=0
          LASTFM_API_KEY=
          LASTFM_API_SECRET=
          RELEASE_CHANNEL=stable
          HIDE_DONATIONS=1
          EOF

      - name: Descargar dependencias reales
        run: |
          set -o pipefail
          flutter pub get 2>&1 | tee spotube-web-build.log

      - name: Compilar Spotube real
        run: |
          set -o pipefail
          flutter build web \
            --release \
            --base-href "/pt34-music-spotube/" \
            2>&1 | tee -a spotube-web-build.log

      - name: Guardar registro de compilación
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Spotube-Web-Log
          path: spotube-web-build.log
          if-no-files-found: warn
