name: PT34-MUSIC PWA

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pt34-music-pages
  cancel-in-progress: true

jobs:
  build:
    name: Crear PWA PT34-MUSIC
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Crear PWA estática
        run: |
          rm -rf site
          mkdir -p site

          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="es">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta name="theme-color" content="#9b5cff">
            <meta name="description" content="PT34-MUSIC · Biblioteca musical personal">
            <link rel="manifest" href="./manifest.webmanifest">
            <link rel="icon" href="./icon.svg" type="image/svg+xml">
            <title>PT34-MUSIC</title>

            <style>
              :root {
                --bg: #111015;
                --surface: #1b1821;
                --surface-2: #25202c;
                --purple: #9b5cff;
                --purple-light: #d8c2ff;
                --text: #f4eff8;
                --muted: #b8b0c1;
                --line: rgba(255,255,255,.09);
              }

              * { box-sizing: border-box; }

              body {
                margin: 0;
                min-height: 100vh;
                background: var(--bg);
                color: var(--text);
                font-family: Arial, Helvetica, sans-serif;
              }

              button, input {
                font: inherit;
              }

              button {
                border: 0;
                cursor: pointer;
              }

              .app {
                width: min(760px, 100%);
                min-height: 100vh;
                margin: 0 auto;
                padding-bottom: 145px;
              }

              header {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 20px;
              }

              .logo {
                width: 48px;
                height: 48px;
                display: grid;
                place-items: center;
                border-radius: 16px;
                background: var(--purple);
                color: white;
                font-size: 27px;
                font-weight: 900;
              }

              .brand {
                flex: 1;
              }

              .brand strong {
                display: block;
                font-size: 20px;
                letter-spacing: .5px;
              }

              .brand span {
                color: var(--muted);
                font-size: 13px;
              }

              .install {
                padding: 10px 13px;
                border-radius: 14px;
                background: var(--surface);
                color: var(--purple-light);
              }

              main {
                padding: 0 20px 30px;
              }

              .page {
                display: none;
              }

              .page.active {
                display: block;
              }

              .searchbox {
                width: 100%;
                border: 0;
                outline: 0;
                border-radius: 18px;
                padding: 16px 18px;
                background: var(--surface);
                color: white;
                font-size: 16px;
              }

              .hero {
                margin-top: 20px;
                padding: 24px;
                border-radius: 28px;
                background: linear-gradient(135deg, #9b5cff, #56319d);
              }

              .hero h1 {
                margin: 0 0 10px;
                font-size: 30px;
              }

              .hero p {
                margin: 0;
                max-width: 440px;
                line-height: 1.45;
              }

              .primary {
                margin-top: 20px;
                padding: 13px 18px;
                border-radius: 16px;
                background: white;
                color: #542a9c;
                font-weight: 800;
              }

              h2 {
                margin: 30px 0 14px;
                font-size: 20px;
              }

              .row {
                display: flex;
                gap: 12px;
                overflow-x: auto;
                padding-bottom: 4px;
              }

              .card {
                min-width: 165px;
                min-height: 125px;
                padding: 16px;
                border-radius: 20px;
                background: var(--surface);
              }

              .card-icon {
                color: var(--purple-light);
                font-size: 28px;
              }

              .card strong {
                display: block;
                margin-top: 24px;
              }

              .card span {
                display: block;
                margin-top: 5px;
                color: var(--muted);
                font-size: 12px;
              }

              .list {
                display: grid;
                gap: 10px;
              }

              .item {
                display: flex;
                align-items: center;
                gap: 14px;
                padding: 14px;
                border-radius: 18px;
                background: var(--surface);
              }

              .item-icon {
                width: 42px;
                height: 42px;
                display: grid;
                place-items: center;
                border-radius: 13px;
                background: rgba(155,92,255,.2);
                color: var(--purple-light);
                font-size: 20px;
              }

              .item-text {
                flex: 1;
              }

              .item-text strong,
              .item-text span {
                display: block;
              }

              .item-text span {
                margin-top: 4px;
                color: var(--muted);
                font-size: 13px;
              }

              .arrow {
                color: var(--muted);
                font-size: 22px;
              }

              .empty {
                padding: 34px 20px;
                text-align: center;
                border-radius: 24px;
                background: var(--surface);
                color: var(--muted);
                line-height: 1.5;
              }

              .empty strong {
                display: block;
                margin-bottom: 8px;
                color: white;
                font-size: 20px;
              }

              .source-form {
                display: grid;
                gap: 12px;
                padding: 18px;
                border-radius: 22px;
                background: var(--surface);
              }

              .source-form input {
                width: 100%;
                padding: 14px;
                border: 1px solid var(--line);
                border-radius: 14px;
                outline: 0;
                background: #121016;
                color: white;
              }

              .source-form button {
                padding: 14px;
                border-radius: 14px;
                background: var(--purple);
                color: white;
                font-weight: 800;
              }

              .player {
                margin-top: 18px;
                padding: 16px;
                border-radius: 20px;
                background: var(--surface-2);
              }

              .player strong,
              .player span {
                display: block;
              }

              .player span {
                margin: 5px 0 12px;
                color: var(--muted);
                font-size: 13px;
              }

              audio {
                width: 100%;
              }

              .mini {
                position: fixed;
                left: 50%;
                bottom: 70px;
                width: min(760px, 100%);
                transform: translateX(-50%);
                padding: 11px 18px;
                background: #27212f;
                border-top: 1px solid var(--line);
              }

              .mini strong,
              .mini span {
                display: block;
              }

              .mini span {
                margin-top: 3px;
                color: var(--muted);
                font-size: 12px;
              }

              nav {
                position: fixed;
                left: 50%;
                bottom: 0;
                width: min(760px, 100%);
                transform: translateX(-50%);
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                padding: 9px 8px max(9px, env(safe-area-inset-bottom));
                background: #17141c;
                border-top: 1px solid var(--line);
              }

              .tab {
                padding: 9px 4px;
                background: transparent;
                color: var(--muted);
                font-size: 12px;
              }

              .tab.active {
                color: var(--purple-light);
                font-weight: 800;
              }

              .toast {
                position: fixed;
                left: 50%;
                bottom: 152px;
                z-index: 5;
                max-width: calc(100% - 36px);
                transform: translateX(-50%) translateY(20px);
                padding: 12px 16px;
                border-radius: 14px;
                background: white;
                color: #251a31;
                font-size: 14px;
                opacity: 0;
                pointer-events: none;
                transition: .2s ease;
              }

              .toast.show {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
              }

              [hidden] {
                display: none !important;
              }
            </style>
          </head>

          <body>
            <div class="app">
              <header>
                <div class="logo">♫</div>
                <div class="brand">
                  <strong>PT34-MUSIC</strong>
                  <span>Tu música, tu biblioteca</span>
                </div>
                <button class="install" id="installButton" hidden>Instalar</button>
              </header>

              <main>
                <section class="page active" id="inicio">
                  <input class="searchbox" id="homeSearch" placeholder="Buscar en tu biblioteca" readonly>

                  <div class="hero">
                    <h1>Todo listo</h1>
                    <p>Crea tu biblioteca personal y reproduce enlaces de audio propios o autorizados compatibles con tu navegador.</p>
                    <button class="primary" data-go="biblioteca">AÑADIR FUENTE</button>
                  </div>

                  <h2>Tus colecciones</h2>
                  <div class="row">
                    <div class="card">
                      <div class="card-icon">♥</div>
                      <strong>Favoritos</strong>
                      <span>Tus temas guardados</span>
                    </div>
                    <div class="card">
                      <div class="card-icon">♫</div>
                      <strong>Mi música</strong>
                      <span>Tu colección personal</span>
                    </div>
                    <div class="card">
                      <div class="card-icon">◉</div>
                      <strong>Podcast</strong>
                      <span>Programas y episodios</span>
                    </div>
                  </div>

                  <h2>Empieza por aquí</h2>
                  <div class="list">
                    <button class="item" data-go="biblioteca">
                      <div class="item-icon">＋</div>
                      <div class="item-text">
                        <strong>Añade una fuente autorizada</strong>
                        <span>Enlace directo de audio compatible con web.</span>
                      </div>
                      <div class="arrow">›</div>
                    </button>

                    <button class="item" id="favoritesButton">
                      <div class="item-icon">♥</div>
                      <div class="item-text">
                        <strong>Crea tus favoritos</strong>
                        <span>Guarda artistas, podcasts y colecciones.</span>
                      </div>
                      <div class="arrow">›</div>
                    </button>
                  </div>
                </section>

                <section class="page" id="buscar">
                  <h2>Buscar</h2>
                  <input class="searchbox" id="searchInput" placeholder="Artistas, álbumes o listas">

                  <div class="list" id="searchResults" style="margin-top:18px">
                    <div class="item result" data-name="Favoritos música">
                      <div class="item-icon">♥</div>
                      <div class="item-text"><strong>Favoritos</strong><span>Tu colección guardada</span></div>
                    </div>
                    <div class="item result" data-name="Mi música biblioteca">
                      <div class="item-icon">♫</div>
                      <div class="item-text"><strong>Mi música</strong><span>Tu biblioteca personal</span></div>
                    </div>
                    <div class="item result" data-name="Podcast episodios">
                      <div class="item-icon">◉</div>
                      <div class="item-text"><strong>Podcast</strong><span>Programas y episodios</span></div>
                    </div>
                  </div>
                </section>

                <section class="page" id="biblioteca">
                  <h2>Biblioteca</h2>

                  <div class="empty" id="emptyLibrary">
                    <strong>Tu biblioteca está vacía</strong>
                    Añade una URL directa de audio que tengas derecho a utilizar. La fuente se guarda solamente en este navegador.
                  </div>

                  <form class="source-form" id="sourceForm" style="margin-top:18px">
                    <input id="sourceName" maxlength="60" placeholder="Nombre de la fuente">
                    <input id="sourceUrl" type="url" placeholder="https://ejemplo.com/audio.mp3" required>
                    <button type="submit">GUARDAR Y REPRODUCIR</button>
                  </form>

                  <div class="player" id="playerPanel" hidden>
                    <strong id="playerName"></strong>
                    <span>Fuente local autorizada</span>
                    <audio id="audioPlayer" controls preload="metadata"></audio>
                  </div>
                </section>

                <section class="page" id="perfil">
                  <h2>Perfil</h2>
                  <div class="list">
                    <div class="item">
                      <div class="item-icon">☺</div>
                      <div class="item-text">
                        <strong>PT34-MUSIC</strong>
                        <span>Edición PWA</span>
                      </div>
                    </div>
                    <div class="item">
                      <div class="item-icon">ⓘ</div>
                      <div class="item-text">
                        <strong>Acerca de</strong>
                        <span>Biblioteca y reproductor web personal.</span>
                      </div>
                    </div>
                  </div>
                </section>
              </main>
            </div>

            <div class="mini" id="miniPlayer" hidden>
              <strong id="miniName">Tu reproductor</strong>
              <span>Audio preparado para reproducir</span>
            </div>

            <nav>
              <button class="tab active" data-tab="inicio">⌂<br>Inicio</button>
              <button class="tab" data-tab="buscar">⌕<br>Buscar</button>
              <button class="tab" data-tab="biblioteca">♫<br>Biblioteca</button>
              <button class="tab" data-tab="perfil">☺<br>Perfil</button>
            </nav>

            <div class="toast" id="toast"></div>

            <script>
              const pages = document.querySelectorAll(".page");
              const tabs = document.querySelectorAll(".tab");
              const toast = document.querySelector("#toast");
              const audio = document.querySelector("#audioPlayer");
              const sourceForm = document.querySelector("#sourceForm");
              const sourceName = document.querySelector("#sourceName");
              const sourceUrl = document.querySelector("#sourceUrl");
              const playerPanel = document.querySelector("#playerPanel");
              const emptyLibrary = document.querySelector("#emptyLibrary");
              const playerName = document.querySelector("#playerName");
              const miniPlayer = document.querySelector("#miniPlayer");
              const miniName = document.querySelector("#miniName");

              function showToast(message) {
                toast.textContent = message;
                toast.classList.add("show");
                setTimeout(() => toast.classList.remove("show"), 2600);
              }

              function goTo(id) {
                pages.forEach(page => page.classList.toggle("active", page.id === id));
                tabs.forEach(tab => tab.classList.toggle("active", tab.dataset.tab === id));
                window.scrollTo({ top: 0, behavior: "smooth" });
              }

              tabs.forEach(tab => {
                tab.addEventListener("click", () => goTo(tab.dataset.tab));
              });

              document.querySelectorAll("[data-go]").forEach(button => {
                button.addEventListener("click", () => goTo(button.dataset.go));
              });

              document.querySelector("#homeSearch").addEventListener("click", () => {
                goTo("buscar");
                setTimeout(() => document.querySelector("#searchInput").focus(), 100);
              });

              document.querySelector("#favoritesButton").addEventListener("click", () => {
                showToast("Los favoritos se activarán cuando añadas contenido.");
              });

              document.querySelector("#searchInput").addEventListener("input", event => {
                const value = event.target.value.trim().toLowerCase();
                document.querySelectorAll(".result").forEach(result => {
                  result.hidden = value && !result.dataset.name.toLowerCase().includes(value);
                });
              });

              function loadSource(source) {
                playerName.textContent = source.name;
                miniName.textContent = source.name;
                audio.src = source.url;
                playerPanel.hidden = false;
                miniPlayer.hidden = false;
                emptyLibrary.hidden = true;
              }

              function restoreSource() {
                const saved = localStorage.getItem("pt34_music_source");
                if (!saved) return;
                try {
                  loadSource(JSON.parse(saved));
                } catch (_) {
                  localStorage.removeItem("pt34_music_source");
                }
              }

              sourceForm.addEventListener("submit", event => {
                event.preventDefault();

                const url = sourceUrl.value.trim();
                const name = sourceName.value.trim() || "Mi fuente de audio";

                try {
                  const parsed = new URL(url);
                  if (parsed.protocol !== "https:" && parsed.protocol !== "http:") {
                    throw new Error("Protocolo no válido");
                  }
                } catch (_) {
                  showToast("Introduce una URL válida que empiece por https://");
                  return;
                }

                const source = { name, url };
                localStorage.setItem("pt34_music_source", JSON.stringify(source));
                loadSource(source);
                audio.play().catch(() => {});
                showToast("Fuente guardada en este navegador.");
              });

              let installPrompt;
              const installButton = document.querySelector("#installButton");

              window.addEventListener("beforeinstallprompt", event => {
                event.preventDefault();
                installPrompt = event;
                installButton.hidden = false;
              });

              installButton.addEventListener("click", async () => {
                if (!installPrompt) {
                  showToast("Usa “Añadir a pantalla de inicio” en el menú del navegador.");
                  return;
                }
                installPrompt.prompt();
                await installPrompt.userChoice;
                installPrompt = null;
                installButton.hidden = true;
              });

              restoreSource();
            </script>
          </body>
          </html>
          HTML

          cat > site/manifest.webmanifest <<'JSON'
          {
            "name": "PT34-MUSIC",
            "short_name": "PT34-MUSIC",
            "start_url": "./",
            "scope": "./",
            "display": "standalone",
            "background_color": "#111015",
            "theme_color": "#9b5cff",
            "description": "Biblioteca y reproductor web personal PT34-MUSIC",
            "lang": "es-ES",
            "icons": [
              {
                "src": "./icon.svg",
                "sizes": "any",
                "type": "image/svg+xml",
                "purpose": "any"
              }
            ]
          }
          JSON

          cat > site/icon.svg <<'SVG'
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
            <rect width="512" height="512" rx="118" fill="#9b5cff"/>
            <path fill="#fff" d="M330 102v214a85 85 0 1 1-42-74V162l-128 35v163a85 85 0 1 1-42-74V164l202-62c20-6 40 9 40 30z"/>
          </svg>
          SVG

          cat > site/sw.js <<'JS'
          const CACHE = "pt34-music-static-v1";
          const FILES = ["./", "./index.html", "./manifest.webmanifest", "./icon.svg"];

          self.addEventListener("install", event => {
            event.waitUntil(
              caches.open(CACHE).then(cache => cache.addAll(FILES))
            );
            self.skipWaiting();
          });

          self.addEventListener("activate", event => {
            event.waitUntil(self.clients.claim());
          });

          self.addEventListener("fetch", event => {
            if (event.request.method !== "GET") return;

            const url = new URL(event.request.url);

            if (url.origin !== self.location.origin) return;

            event.respondWith(
              caches.match(event.request).then(cached => {
                return cached || fetch(event.request);
              })
            );
          });
          JS

          python3 - <<'PY'
          from pathlib import Path

          file = Path("site/index.html")
          html = file.read_text(encoding="utf-8")
          html = html.replace(
              "</body>",
              """<script>
              if ("serviceWorker" in navigator) {
                window.addEventListener("load", () => {
                  navigator.serviceWorker.register("./sw.js", { scope: "./" });
                });
              }
              </script></body>"""
          )
          file.write_text(html, encoding="utf-8")
          PY

      - name: Subir PWA a Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Publicar PT34-MUSIC
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Publicar PWA
        id: deployment
        uses: actions/deploy-pages@v4
