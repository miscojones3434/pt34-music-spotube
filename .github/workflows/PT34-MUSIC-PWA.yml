name: PT34-MUSIC · Spotube Web

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "lib/main_web.dart"
      - ".github/workflows/PT34-MUSIC-PWA.yml"
      - "assets/branding/pt34-music-logo.png"

permissions:
  contents: write

concurrency:
  group: pt34-music-web-build
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Compilar y publicar PT34-MUSIC
    runs-on: ubuntu-22.04
    timeout-minutes: 12

    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: "3.35.2"
          channel: stable
          cache: true

      - name: Crear proyecto web mínimo
        run: |
          rm -rf .pt34-web

          flutter create \
            --platforms=web \
            --project-name pt34_music_web \
            .pt34-web

          cp lib/main_web.dart .pt34-web/lib/main.dart

          python3 - <<'PY'
          from pathlib import Path

          file = Path(".pt34-web/web/index.html")
          html = file.read_text(encoding="utf-8")
          html = html.replace(
              "<title>pt34_music_web</title>",
              "<title>PT34-MUSIC</title>",
          )
          file.write_text(html, encoding="utf-8")
          PY

      - name: Compilar PT34-MUSIC Web
        working-directory: .pt34-web
        run: |
          flutter pub get

          flutter build web \
            --release \
            --base-href "/pt34-music-spotube/"

      - name: Aplicar logo y configuración PWA
        run: |
          cp assets/branding/pt34-music-logo.png \
            .pt34-web/build/web/pt34-music-logo.png

          cp .pt34-web/build/web/index.html \
            .pt34-web/build/web/404.html

          touch .pt34-web/build/web/.nojekyll

          cat > .pt34-web/build/web/manifest.json <<'JSON'
          {
            "name": "PT34-MUSIC",
            "short_name": "PT34-MUSIC",
            "start_url": "./",
            "scope": "./",
            "display": "standalone",
            "background_color": "#100E14",
            "theme_color": "#9B5CFF",
            "description": "PT34-MUSIC · Spotube Web",
            "lang": "es-ES",
            "icons": [
              {
                "src": "pt34-music-logo.png",
                "sizes": "512x512",
                "type": "image/png",
                "purpose": "any maskable"
              }
            ]
          }
          JSON

      - name: Publicar directamente en gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          rm -rf .pt34-pages
          mkdir .pt34-pages

          cp -a .pt34-web/build/web/. .pt34-pages/

          cd .pt34-pages

          git init --initial-branch=gh-pages

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add --all
          git commit -m "PT34-MUSIC web ${GITHUB_SHA}"

          git remote add origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git push --force origin HEAD:gh-pages
