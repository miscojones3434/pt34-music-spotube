name: PT34-MUSIC · APK Spotube original

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/spotube-release-binary.yml"

permissions:
  contents: read

jobs:
  android:
    name: Compilar APK Spotube original
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Descargar Spotube original
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: "3.35.2"
          channel: stable
          cache: true

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Crear firma temporal de prueba
        run: |
          keytool -genkeypair -noprompt \
            -keystore android/app/upload-keystore.jks \
            -storepass android \
            -keypass android \
            -alias pt34music \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=PT34-MUSIC, OU=PT34, O=PT34, L=Spain, S=Spain, C=ES"

          cat > android/key.properties <<'EOF'
          storePassword=android
          keyPassword=android
          keyAlias=pt34music
          storeFile=upload-keystore.jks
          EOF

      - name: Instalar dependencias reales de Spotube
        run: |
          flutter pub get
          dart cli/cli.dart install-dependencies --platform=android --arch=all

      - name: Compilar APK Android real
        env:
          CHANNEL: stable
          FLUTTER_VERSION: "3.35.2"
          DOTENV: |
            ENABLE_UPDATE_CHECK=0
            LASTFM_API_KEY=
            LASTFM_API_SECRET=
            RELEASE_CHANNEL=stable
            HIDE_DONATIONS=1
        run: |
          dart cli/cli.dart build --arch=all android

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: PT34-MUSIC-Spotube-APK
          path: build/Spotube-android-all-arch.apk
          if-no-files-found: error
          retention-days: 14
