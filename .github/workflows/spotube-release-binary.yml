name: PT34-MUSIC · APK final

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/spotube-release-binary.yml"
      - "assets/branding/pt34-music-logo.png"

permissions:
  contents: read

jobs:
  android:
    name: Compilar PT34-MUSIC
    runs-on: ubuntu-22.04
    timeout-minutes: 35

    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: "3.35.2"
          channel: stable
          cache: true

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Crear firma temporal
        run: |
          keytool -genkeypair -noprompt \
            -keystore android/app/upload-keystore.jks \
            -storepass android \
            -keypass android \
            -alias pt34music \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=PT34-MUSIC, OU=PT34, O=PT34, L=Spain, S=Spain, C=ES"

          cat > android/key.properties <<'EOF'
          storePassword=android
          keyPassword=android
          keyAlias=pt34music
          storeFile=upload-keystore.jks
          EOF

      - name: Aplicar logo y nombre PT34-MUSIC
        run: |
          set -euo pipefail

          LOGO="assets/branding/pt34-music-logo.png"

          test -s "$LOGO"

          cp "$LOGO" assets/branding/spotube-logo.png
          cp "$LOGO" assets/branding/spotube-logo-foreground.png
          cp "$LOGO" assets/branding/spotube-logo-macos.png
          cp "$LOGO" assets/spotube-logo.png
          cp "$LOGO" assets/spotube-logo_android12.png
          cp "$LOGO" assets/branding.png

          python3 - <<'PY'
          from pathlib import Path

          gradle = Path("android/app/build.gradle")
          text = gradle.read_text(encoding="utf-8")

          old = 'resValue "string", "app_name_en", "Spotube"'
          new = 'resValue "string", "app_name_en", "PT34-MUSIC"'

          if old not in text:
              raise SystemExit("No se encontró el nombre Android esperado.")

          gradle.write_text(text.replace(old, new, 1), encoding="utf-8")

          main = Path("lib/main.dart")
          text = main.read_text(encoding="utf-8")

          old = "title: 'Spotube'"
          new = "title: 'PT34-MUSIC'"

          if old not in text:
              raise SystemExit("No se encontró el título Flutter esperado.")

          main.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

          flutter pub get

          dart run flutter_launcher_icons

          cat > .pt34-splash.yaml <<'YAML'
          flutter_native_splash:
            color: "#050309"
            color_dark: "#050309"
            image: assets/branding/pt34-music-logo.png
            image_dark: assets/branding/pt34-music-logo.png
            fullscreen: true
            android: true
            ios: false
            web: false

            android_12:
              color: "#050309"
              icon_background_color: "#050309"
              image: assets/branding/pt34-music-logo.png
              image_dark: assets/branding/pt34-music-logo.png
          YAML

          dart run flutter_native_splash:create --path=.pt34-splash.yaml

      - name: Instalar dependencias reales de Spotube
        run: |
          dart cli/cli.dart install-dependencies --platform=android --arch=all

      - name: Compilar APK Android
        env:
          CHANNEL: stable
          FLUTTER_VERSION: "3.35.2"
          DOTENV: |
            ENABLE_UPDATE_CHECK=0
            HIDE_DONATIONS=1
            RELEASE_CHANNEL=stable
        run: |
          dart cli/cli.dart build --arch=all android
          cp build/Spotube-android-all-arch.apk \
            build/PT34-MUSIC-android-all-arch.apk

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: PT34-MUSIC-APK-FINAL
          path: build/PT34-MUSIC-android-all-arch.apk
          if-no-files-found: error
          retention-days: 14
