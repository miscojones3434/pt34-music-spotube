name: PT34-MUSIC · APK con logo

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/spotube-release-binary.yml"
      - "assets/branding/pt34-music-logo.png"

permissions:
  contents: read

jobs:
  android:
    name: Compilar PT34-MUSIC Android
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.2"
          channel: stable
          cache: true

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Descargar dependencias
        run: flutter pub get

      - name: Aplicar marca PT34-MUSIC
        run: |
          set -euo pipefail

          LOGO="assets/branding/pt34-music-logo.png"
          test -f "$LOGO"

          cp "$LOGO" assets/branding/spotube-logo.png
          cp "$LOGO" assets/branding/spotube-logo-light.png
          cp "$LOGO" assets/branding/spotube-logo-foreground.png
          cp "$LOGO" assets/branding/spotube-logo-macos.png
          cp "$LOGO" assets/spotube-logo.png
          cp "$LOGO" assets/spotube-logo_android12.png
          cp "$LOGO" assets/branding.png

          python3 - <<'PY'
          from pathlib import Path

          def replace_exact(path, old, new):
              text = path.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"No se encontró el texto esperado en {path}")
              path.write_text(text.replace(old, new), encoding="utf-8")

          replace_exact(
              Path("android/app/build.gradle"),
              'resValue "string", "app_name_en", "Spotube"',
              'resValue "string", "app_name_en", "PT34-MUSIC"',
          )

          replace_exact(
              Path("lib/main.dart"),
              "title: 'Spotube'",
              "title: 'PT34-MUSIC'",
          )

          player = Path("lib/services/audio_player/audio_player.dart")
          if player.exists():
              text = player.read_text(encoding="utf-8")
              player.write_text(
                  text.replace('title: "Spotube"', 'title: "PT34-MUSIC"'),
                  encoding="utf-8",
              )

          l10n = Path("lib/l10n")
          if l10n.exists():
              for file in l10n.glob("*.arb"):
                  text = file.read_text(encoding="utf-8")
                  file.write_text(
                      text.replace("Spotube", "PT34-MUSIC"),
                      encoding="utf-8",
                  )
          PY

      - name: Crear icono PT34-MUSIC
        run: |
          dart run flutter_launcher_icons

      - name: Crear splash PT34-MUSIC
        run: |
          cat > .pt34-splash.yaml <<'YAML'
          flutter_native_splash:
            color: "#050309"
            color_dark: "#050309"
            image: assets/branding/pt34-music-logo.png
            image_dark: assets/branding/pt34-music-logo.png
            branding: assets/branding/pt34-music-logo.png
            android: true
            ios: false
            web: false
            fullscreen: true

            android_12:
              color: "#050309"
              icon_background_color: "#050309"
              image: assets/branding/pt34-music-logo.png
              image_dark: assets/branding/pt34-music-logo.png
          YAML

          dart run flutter_native_splash:create -p .pt34-splash.yaml

      - name: Crear firma de prueba
        run: |
          keytool -genkeypair -noprompt \
            -keystore android/app/upload-keystore.jks \
            -storepass android \
            -keypass android \
            -alias pt34music \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=PT34-MUSIC, OU=PT34, O=PT34, L=Spain, S=Spain, C=ES"

          cat > android/key.properties <<'EOF'
          storePassword=android
          keyPassword=android
          keyAlias=pt34music
          storeFile=upload-keystore.jks
          EOF

      - name: Instalar motor Android
        run: |
          dart cli/cli.dart install-dependencies --platform=android --arch=all

      - name: Compilar APK
        env:
          CHANNEL: stable
          FLUTTER_VERSION: "3.35.2"
          DOTENV: |
            ENABLE_UPDATE_CHECK=0
            HIDE_DONATIONS=1
            RELEASE_CHANNEL=stable
        run: |
          dart cli/cli.dart build --arch=all android
          cp build/Spotube-android-all-arch.apk \
            build/PT34-MUSIC-android-all-arch.apk

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: PT34-MUSIC-APK
          path: build/PT34-MUSIC-android-all-arch.apk
          if-no-files-found: error
          retention-days: 14
