name: PT34-MUSIC · APK final

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/spotube-release-binary.yml"
      - "assets/branding/pt34-music-logo.png"
      - "android/**"
      - "lib/**"
      - "activation/**"

permissions:
  contents: read

jobs:
  android:
    name: Compilar PT34-MUSIC
    runs-on: ubuntu-22.04
    timeout-minutes: 40

    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: "3.35.2"
          channel: stable
          cache: true

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Crear firma temporal
        run: |
          keytool -genkeypair -noprompt \
            -keystore android/app/upload-keystore.jks \
            -storepass android \
            -keypass android \
            -alias pt34music \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=PT34-MUSIC, OU=PT34, O=PT34, L=Spain, S=Spain, C=ES"

          cat > android/key.properties <<'EOF'
          storePassword=android
          keyPassword=android
          keyAlias=pt34music
          storeFile=upload-keystore.jks
          EOF

      - name: Aplicar identidad PT34-MUSIC
        run: |
          set -euo pipefail

          LOGO="assets/branding/pt34-music-logo.png"

          test -s "$LOGO"

          for TARGET in \
            "assets/branding/spotube-logo.png" \
            "assets/branding/spotube-logo-light.png" \
            "assets/branding/spotube-logo-foreground.png" \
            "assets/branding/spotube-logo-macos.png" \
            "assets/spotube-logo.png" \
            "assets/spotube-logo_android12.png" \
            "assets/branding/branding.png"
          do
            cp "$LOGO" "$TARGET"
          done

          find android/app/src/main/res \
            -type f \
            \( \
              -name "ic_launcher*.png" -o \
              -name "splash.png" -o \
              -name "android12splash.png" -o \
              -name "branding.png" -o \
              -name "android12branding.png" \
            \) \
            -print0 |
          while IFS= read -r -d '' FILE; do
            cp "$LOGO" "$FILE"
          done

          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text(encoding="utf-8")

              if old not in text:
                  raise SystemExit(
                      f"No se encontró el texto esperado: {path}"
                  )

              file.write_text(
                  text.replace(old, new, 1),
                  encoding="utf-8",
              )

          replace_once(
              "android/app/build.gradle",
              'resValue "string", "app_name_en", "Spotube"',
              'resValue "string", "app_name_en", "PT34-MUSIC"',
          )

          replace_once(
              "lib/main.dart",
              'await localNotifier.setup(appName: "Spotube");',
              'await localNotifier.setup(appName: "PT34-MUSIC");',
          )

          replace_once(
              "lib/main.dart",
              "title: 'Spotube'",
              "title: 'PT34-MUSIC'",
          )

          replace_once(
              "lib/modules/root/sidebar/sidebar.dart",
              'child: const Text("Spotube"),',
              '''child: Image.asset(
                  "assets/branding/spotube-logo-light.png",
                  width: 158,
                  height: 48,
                ),''',
          )

          replace_once(
              "lib/pages/home/home.dart",
              'child: const Text("Spotube"),',
              '''child: Image.asset(
                  "assets/branding/spotube-logo-light.png",
                  width: 158,
                  height: 48,
                ),''',
          )

          replace_once(
              "lib/pages/getting_started/sections/greeting.dart",
              'const Text("Spotube").semiBold().h4(),',
              'const Text("PT34-MUSIC").semiBold().h4(),',
          )
          PY

      - name: Instalar dependencias reales
        run: |
          flutter pub get
          dart cli/cli.dart install-dependencies --platform=android --arch=all

      - name: Compilar APK Android
        env:
          CHANNEL: stable
          FLUTTER_VERSION: "3.35.2"
          DOTENV: |
            ENABLE_UPDATE_CHECK=0
            LASTFM_API_KEY=
            LASTFM_API_SECRET=
            RELEASE_CHANNEL=stable
            HIDE_DONATIONS=1
        run: |
          dart cli/cli.dart build --arch=all android

          cp build/Spotube-android-all-arch.apk \
            build/PT34-MUSIC-android-all-arch.apk

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: PT34-MUSIC-APK-FINAL
          path: build/PT34-MUSIC-android-all-arch.apk
          if-no-files-found: error
          retention-days: 14
