name: PT34-MUSIC · APK Android final

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/spotube-release-binary.yml"
      - "assets/branding/pt34-music-logo.png"

permissions:
  contents: read

jobs:
  android:
    name: Compilar PT34-MUSIC Android
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: "3.35.2"
          channel: stable
          cache: true

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Descargar dependencias
        run: flutter pub get

      - name: Aplicar branding PT34-MUSIC
        run: |
          set -euo pipefail

          LOGO="assets/branding/pt34-music-logo.png"

          test -f "$LOGO"

          for TARGET in \
            "assets/branding/spotube-logo.png" \
            "assets/branding/spotube-logo-light.png" \
            "assets/branding/spotube-logo-foreground.png" \
            "assets/branding/spotube-logo-item.png" \
            "assets/branding/spotube-logo-macos.png" \
            "assets/branding/spotube-logo_android12.png" \
            "assets/spotube-logo.png" \
            "assets/spotube-logo_android12.png" \
            "assets/branding.png"
          do
            mkdir -p "$(dirname "$TARGET")"
            cp "$LOGO" "$TARGET"
          done

          python3 - <<'PY'
          from pathlib import Path

          gradle = Path("android/app/build.gradle")
          text = gradle.read_text(encoding="utf-8")
          old = 'resValue "string", "app_name_en", "Spotube"'
          if old not in text:
              raise SystemExit("No se encontró el nombre Android original.")
          gradle.write_text(
              text.replace(old, 'resValue "string", "app_name_en", "PT34-MUSIC"'),
              encoding="utf-8",
          )

          main = Path("lib/main.dart")
          text = main.read_text(encoding="utf-8")
          old = "title: 'Spotube'"
          if old not in text:
              raise SystemExit("No se encontró el título Flutter original.")
          main.write_text(
              text.replace(old, "title: 'PT34-MUSIC'"),
              encoding="utf-8",
          )

          env = Path("lib/collections/env.dart")
          text = env.read_text(encoding="utf-8")
          old = "static bool get hideDonations => _hideDonations == 1;"
          if old in text:
              env.write_text(
                  text.replace(old, "static bool get hideDonations => true;"),
                  encoding="utf-8",
              )
          PY

      - name: Crear icono PT34-MUSIC
        run: |
          cat > flutter_launcher_icons.yaml <<'YAML'
          flutter_launcher_icons:
            android: true
            ios: false
            web:
              generate: false
            windows:
              generate: false
            macos:
              generate: false
            image_path: "assets/branding/pt34-music-logo.png"
            min_sdk_android: 24
            adaptive_icon_background: "#06010A"
            adaptive_icon_foreground: "assets/branding/pt34-music-logo.png"
          YAML

          dart run flutter_launcher_icons

      - name: Crear splash PT34-MUSIC
        run: |
          cat > flutter_native_splash.yaml <<'YAML'
          flutter_native_splash:
            color: "#06010A"
            color_dark: "#06010A"
            image: assets/branding/pt34-music-logo.png
            image_dark: assets/branding/pt34-music-logo.png
            android: true
            ios: false
            web: false
            fullscreen: true

            android_12:
              color: "#06010A"
              icon_background_color: "#06010A"
              image: assets/branding/pt34-music-logo.png
              image_dark: assets/branding/pt34-music-logo.png
          YAML

          dart run flutter_native_splash:create

      - name: Crear firma de compilación
        run: |
          keytool -genkeypair -noprompt \
            -keystore android/app/upload-keystore.jks \
            -storepass android \
            -keypass android \
            -alias pt34music \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=PT34-MUSIC, OU=PT34, O=PT34, L=Spain, S=Spain, C=ES"

          cat > android/key.properties <<'EOF'
          storePassword=android
          keyPassword=android
          keyAlias=pt34music
          storeFile=upload-keystore.jks
          EOF

      - name: Instalar motor Android
        run: |
          dart cli/cli.dart install-dependencies --platform=android --arch=all

      - name: Compilar APK PT34-MUSIC
        env:
          CHANNEL: stable
          FLUTTER_VERSION: "3.35.2"
          DOTENV: |
            ENABLE_UPDATE_CHECK=0
            HIDE_DONATIONS=1
            LASTFM_API_KEY=
            LASTFM_API_SECRET=
            RELEASE_CHANNEL=stable
        run: |
          dart cli/cli.dart build --arch=all android
          cp build/Spotube-android-all-arch.apk \
            build/PT34-MUSIC-android-all-arch.apk

      - name: Guardar APK final
        uses: actions/upload-artifact@v4
        with:
          name: PT34-MUSIC-APK-FINAL
          path: build/PT34-MUSIC-android-all-arch.apk
          if-no-files-found: error
          retention-days: 14
